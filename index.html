<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Windows Meow Edition - Pixel Vibe</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            /* Классический фон Bliss */
            background: url('https://tjkelly.com/wp-content/uploads/windows-xp-desktop-background-wallpaper-bliss-800x600.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tahoma', sans-serif;
        }

        /* ПИКСЕЛЬНЫЕ ПУЗЫРИ */
        .pixel-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            /* Эффект пиксельных краев через box-shadow */
            box-shadow: 
                inset 4px 4px 0 rgba(255,255,255,0.8),
                inset -4px -4px 0 rgba(0,0,0,0.1);
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 5;
            animation: float 15s infinite ease-in-out;
        }

        /* Анимация плавания */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(5deg); }
            66% { transform: translate(-20px, -100px) rotate(-5deg); }
        }

        /* ОКНО XP */
        .xp-window {
            width: 400px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px; border-top-right-radius: 8px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .xp-title {
            background: linear-gradient(180deg, #0997ff 0%, #0054e3 10%, #0054e3 90%, #002e8d 100%);
            color: white; padding: 5px 10px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }

        .xp-content { padding: 30px; text-align: center; }

        .meow-btn {
            background: #ffcc00; /* Яркий цвет для акцента */
            border: 3px black solid;
            padding: 10px 40px; font-size: 24px; font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
        }
        .meow-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px black; }

        /* ПАНЕЛЬ ПУСК */
        .taskbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 30px;
            background: linear-gradient(180deg, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            z-index: 1000; display: flex; align-items: center;
        }

        .start-btn {
            height: 100%; padding: 0 15px;
            background: linear-gradient(180deg, #388a3a 0%, #46b74a 10%, #388a3a 90%, #1e4b1f 100%);
            color: white; font-style: italic; font-weight: bold;
            display: flex; align-items: center; border-right: 1px solid #1e4b1f;
            cursor: pointer;
        }

        /* НЯН КЭТ */
        #cat {
            position: fixed; top: 40%; left: -400px; width: 250px;
            z-index: 200; pointer-events: none;
            image-rendering: pixelated;
        }

        @keyframes fly {
            0% { left: -400px; }
            100% { left: 120%; }
        }

        /* Иконка IE */
        .ie-icon {
            position: absolute; width: 50px; opacity: 0.6;
            animation: float 20s infinite linear;
            z-index: 2;
        }
    </style>
</head>
<body>

    <audio id="meow-sound" src="https://www.myinstants.com/media/sounds/nyan_cat_compressed.mp3"></audio>

    <div class="pixel-bubble" style="width: 100px; height: 100px; top: 20%; left: 10%; animation-duration: 12s;"></div>
    <div class="pixel-bubble" style="width: 60px; height: 60px; bottom: 30%; right: 15%; animation-duration: 18s;"></div>
    <div class="pixel-bubble" style="width: 40px; height: 40px; top: 60%; left: 25%; animation-duration: 10s;"></div>

    <img class="ie-icon" srch="https://win98icons.alexmeub.com/icons/png/msie1-2.png" style="top: 10%; right: 20%;">

    <div class="xp-window">
        <div class="xp-title">
            <span>Meow Explorer</span>
            <span style="background: #e04343; width: 22px; height: 22px; text-align: center; border: 1px solid white; cursor: pointer;">X</span>
        </div>
        <div class="xp-content">
            <img src="https://win98icons.alexmeub.com/icons/png/msg_warning-0.png" style="margin-bottom: 10px;">
            <p style="margin-bottom: 20px; font-weight: bold;">Критическая доза милоты!</p>
            <button class="meow-btn" onclick="goMeow()">МЯУ</button>
        </div>
    </div>

    <img id="cat" src="https://media.giphy.com/media/sIIhZliB2McAo/giphy.gif" alt="Nyan Cat">

    <div class="taskbar">
        <div class="start-btn">пуск</div>
        <div style="color: white; margin-left: auto; padding-right: 10px; font-size: 12px;" id="clock">12:00</div>
    </div>

    <script>
        // Часы для панели задач
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function goMeow() {
            const sound = document.getElementById('meow-sound');
            const cat = document.getElementById('cat');

            sound.currentTime = 0;
            sound.play();

            cat.style.animation = 'none';
            void cat.offsetWidth;
            cat.style.animation = 'fly 18s linear forwards'; // Ускорил до 5 секунд для драйва
        }
    </script>
</body>
</html>
