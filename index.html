<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Meow Edition</title>
    <style>
        /* Основной фон в стиле Bliss (зеленые холмы) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://i.imgur.com/Zk6y2ng.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tahoma', sans-serif;
            overflow: hidden;
        }

        /* Стилизация глянцевой кнопки */
        .meow-button {
            padding: 20px 50px;
            font-size: 32px;
            font-weight: bold;
            color: #1a4d8c;
            text-transform: uppercase;
            cursor: pointer;
            border: 2px solid #fff;
            border-radius: 50px;
            background: linear-gradient(180deg, #ffffff 0%, #a1c4fd 50%, #c2e9fb 100%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 -5px 10px rgba(255,255,255,0.8);
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 10;
            position: relative;
        }

        .meow-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        .meow-button:active {
            transform: scale(0.95);
        }

        /* Тот самый Nyan Cat */
        #nyan-cat {
            position: absolute;
            width: 150px;
            top: 50%;
            left: -200px; /* Прячем за левым краем */
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 5;
        }

        /* Анимация полета */
        @keyframes flyAcross {
            from { left: -200px; }
            to { left: 110%; }
        }

        .animate-nyan {
            animation: flyAcross 3s linear forwards;
        }

        /* Декоративный пузырь (Frutiger Aero style) */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <audio id="meow-sound" src="https://www.myinstants.com/media/sounds/meow.mp3"></audio>

    <div class="bubble" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="bubble" style="width: 100px; height: 100px; bottom: 20%; right: 15%;"></div>
