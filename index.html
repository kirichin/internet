<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Windows Meow Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            /* Тот самый фон Bliss (зеленые холмы) */
            background: url('https://www.wallpaperhub.app/_next/image?url=https%3A%2F%2Fcdn.wallpaperhub.app%2Fcloudcache%2Fe%2F6%2F7%2F3%2F1%2F4%2Fe6731493cd50103e3561288c33a6a589c9bf67ab.jpg&w=384&q=75') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tahoma', sans-serif;
        }

        /* Окно Windows XP */
        .xp-window {
            width: 400px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            position: relative;
        }

        .xp-title {
            background: linear-gradient(180deg, #0997ff 0%, #0054e3 10%, #0054e3 90%, #002e8d 100%);
            color: white;
            padding: 5px 10px;
            font-weight: bold;
            display: flex; justify-content: space-between;
            border-top-left-radius: 5px; border-top-right-radius: 5px;
        }

        .xp-content {
            padding: 30px;
            text-align: center;
        }

        /* Кнопка МЯУ */
        .meow-btn {
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            border: 2px solid #707070;
            padding: 10px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: inset 0 0 5px white;
        }
        .meow-btn:hover { background: #f0f0f0; }
        .meow-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

        /* Пузыри (рисуем через CSS, чтобы точно были) */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            box-shadow: inset -10px -10px 20px rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
        }

        /* Nyan Cat (или Хеллоу Китти) */
        #cat {
            position: fixed;
            top: 40%;
            left: -400px;
            width: 300px;
            z-index: 200;
            pointer-events: none;
        }

        @keyframes fly {
            0% { left: -400px; }
            100% { left: 120%; }
        }
    </style>
</head>
<body>

    <audio id="meow-sound" src="https://www.myinstants.com/media/sounds/nyan_cat_compressed.mp3"></audio>

    <div class="bubble" style="width: 200px; height: 200px; top: 10%; left: 5%;"></div>
    <div class="bubble" style="width: 150px; height: 150px; bottom: 10%; right: 10%;"></div>
    <div class="bubble" style="width: 80px; height: 80px; top: 50%; right: 30%;"></div>

    <div class="xp-window">
        <div class="xp-title">
            <span>Internet Explorer</span>
            <span style="background: red; width: 20px; text-align: center; cursor: pointer;">X</span>
        </div>
        <div class="xp-content">
            <p style="margin-bottom: 20px; font-size: 18px;">The Internet is starting...</p>
            <button class="meow-btn" onclick="goMeow()">МЯУ</button>
        </div>
    </div>

    <img id="cat" src="https://media.giphy.com/media/sIIhZliB2McAo/giphy.gif" alt="Nyan Cat">

    <script>
        function goMeow() {
            const sound = document.getElementById('meow-sound');
            const cat = document.getElementById('cat');

            // Включаем звук
            sound.currentTime = 0;
            sound.play();

            // Запускаем кота
            cat.style.animation = 'none';
            void cat.offsetWidth; // Сброс анимации
            cat.style.animation = 'fly 3s linear forwards';
        }
    </script>
</body>
</html>
